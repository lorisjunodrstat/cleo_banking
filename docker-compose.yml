version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: app_mysql
    command: --default-authentication-plugin=mysql_native_password
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: appdb
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppassword123
    volumes:
      - mysql_data:/var/lib/mysql
    # On laisse 3306 pour que vous puissiez inspecter la DB avec TablePlus ou DBeaver
    ports:
      - "3307:3306"
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootpassword123}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: app_flask
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      FLASK_APP: __init__.py
      FLASK_ENV: development  # Changé en development pour avoir les logs d'erreurs
      DB_HOST: db             # IMPORTANT : On pointe vers le service 'db' local
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-appdb}
      DB_USER: ${DB_USER:-appuser}
      DB_PASSWORD: ${DB_PASSWORD:-apppassword123}
      SECRET_KEY: ${SECRET_KEY}
    volumes:
      - ./uploads:/app/uploads
      - ./static:/app/static:ro
    ports:
      - "8073:5000"           # Accès via http://localhost:8073
    networks:
      - app_network
  phpmyadmin:
      image: phpmyadmin
      container_name: app_phpmyadmin
      restart: unless-stopped
      ports:
        - "8081:80"
      environment:
        PMA_HOST: db
        MYSQL_ROOT_PASSWORD: root
      networks:
        - app_network
volumes:
  mysql_data:

networks:
  app_network:
    driver: bridge